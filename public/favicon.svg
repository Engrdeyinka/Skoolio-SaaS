  <!-- mortarboard top -->
  <path d="M50 24 L86 39 L50 54 L14 39 Z" fill="#ffffff"/>
  <!-- cap base -->
  <path d="M28 47 v13 c0 5.2 9.8 9.5 22 9.5 s22 -4.3 22 -9.5 v-13 l-22 9.2 z" fill="#ffffff"/>
  <!-- tassel cord -->
